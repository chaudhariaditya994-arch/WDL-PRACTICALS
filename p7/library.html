<!DOCTYPE html>
<html>
<head>
    <title>Library Webpage</title>

    <style>

        body {
            font-family: Arial;
            background-color: lightyellow;
            text-align: center;
        }

        table {
            margin: auto;
            border-collapse: collapse;
        }

        td, th {
            padding: 10px;
        }

    </style>

    <script>

        function calculateFine() {

            var days =
            parseInt(document.getElementById("days").value);

            var fine = 0;

            switch(true) {

                case (days <= 5):
                    fine = days * 1;
                    break;

                case (days <= 10):
                    fine = days * 2;
                    break;

                default:
                    fine = days * 5;
            }

            document.getElementById("result").innerHTML =
            "Book Fine = Rs. " + fine;
        }

    </script>

</head>

<body>

<h2>Library Books Information</h2>

<table border="1">

    <tr>
        <th>Book</th>
        <th>Image</th>
    </tr>

    <tr>
        <td>PHP Programming</td>

        <td>
            <img src="book1.jpg"
                 width="100" height="120">
        </td>
    </tr>

    <tr>
        <td>Java Programming</td>

        <td>
            <img src="book2.jpg"
                 width="100" height="120">
        </td>
    </tr>

</table>

<br><br>

<h3>Book Fine Calculator</h3>

Enter Late Days:

<input type="number" id="days">

<button onclick="calculateFine()">
    Calculate
</button>

<p id="result"></p>

</body>
</html>
